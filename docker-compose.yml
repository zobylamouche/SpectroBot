services:
  mongo:
    image: mongo:7
    container_name: spectrobot-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: spectrobot
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - spectrobot_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spectrobot-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: spectrobot
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      ENABLE_OLLAMA_FALLBACK: ${ENABLE_OLLAMA_FALLBACK:-true}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    depends_on:
      mongo:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    networks:
      - spectrobot_net

  ollama:
    image: ollama/ollama:latest
    container_name: spectrobot-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - spectrobot_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: spectrobot-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1"]
      interval: 15s
      timeout: 5s
      retries: 10
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - spectrobot_net

volumes:
  mongo_data:
  ollama_data:

networks:
  spectrobot_net:
    driver: bridge
